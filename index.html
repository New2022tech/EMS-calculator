<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elderly Mobility Scale (EMS) Calculator</title>
<style>
:root {
--primary: #2b6cb0;
--bg: #f7fafc;
--card-bg: #ffffff;
--text: #2d3748;
--border: #e2e8f0;
}

body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
background-color: var(--bg);
color: var(--text);
margin: 0;
padding: 15px;
display: flex;
justify-content: center;
}

.app-container {
width: 100%;
max-width: 500px;
background: var(--card-bg);
padding: 20px;
border-radius: 12px;
box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
}

h1 {
font-size: 1.4rem;
text-align: center;
color: var(--primary);
margin-top: 0;
margin-bottom: 20px;
border-bottom: 2px solid var(--border);
padding-bottom: 10px;
}

.question-block {
margin-bottom: 20px;
padding-bottom: 15px;
border-bottom: 1px solid var(--border);
}

label {
display: block;
font-weight: 600;
margin-bottom: 8px;
font-size: 0.95rem;
}

select {
width: 100%;
padding: 12px;
font-size: 1rem;
border-radius: 8px;
border: 1px solid var(--border);
background-color: #fff;
-webkit-appearance: none; /* Better mobile styling */
appearance: none;
}

.result-box {
margin-top: 25px;
padding: 15px;
border-radius: 8px;
background-color: #edf2f7;
text-align: center;
}

.score-display {
font-size: 2rem;
font-weight: bold;
color: var(--primary);
margin: 10px 0;
}

.interpretation {
font-weight: 500;
font-size: 1rem;
line-height: 1.4;
}

/* Color coding for interpretation statuses */
.status-independent { color: #2f855a; font-weight: bold; }
.status-borderline { color: #c05621; font-weight: bold; }
.status-dependent { color: #9b2c2c; font-weight: bold; }
</style>
</head>
<body>

<div class="app-container">
<h1>EMS Calculator</h1>

<form id="emsForm">
<!-- 1. Lying to Sitting -->
<div class="question-block">
<label for="lyingToSitting">1. Lying to Sitting</label>
<select id="lyingToSitting" onchange="calculateScore()">
<option value="2">Independent (2 pts)</option>
<option value="1">Needs help of 1 person (1 pt)</option>
<option value="0">Needs help of 2+ people (0 pts)</option>
</select>
</div>

<!-- 2. Sitting to Lying -->
<div class="question-block">
<label for="sittingToLying">2. Sitting to Lying</label>
<select id="sittingToLying" onchange="calculateScore()">
<option value="2">Independent (2 pts)</option>
<option value="1">Needs help of 1 person (1 pt)</option>
<option value="0">Needs help of 2+ people (0 pts)</option>
</select>
</div>

<!-- 3. Sit to Stand -->
<div class="question-block">
<label for="sitToStand">3. Sit to Stand</label>
<select id="sitToStand" onchange="calculateScore()">
<option value="3">Independent in &lt; 3 seconds (3 pts)</option>
<option value="2">Independent in &gt; 3 seconds (2 pts)</option>
<option value="1">Needs help of 1 person (verbal/physical) (1 pt)</option>
<option value="0">Needs help of 2+ people (0 pts)</option>
</select>
</div>

<!-- 4. Standing -->
<div class="question-block">
<label for="standing">4. Standing</label>
<select id="standing" onchange="calculateScore()">
<option value="3">Stands without support & reaches within arm's length (3 pts)</option>
<option value="2">Stands without support but needs help to reach (2 pts)</option>
<option value="1">Stands, but requires support (uses upper limbs to steady) (1 pt)</option>
<option value="0">Stands only with physical support of 1 person (0 pts)</option>
</select>
</div>

<!-- 5. Gait -->
<div class="question-block">
<label for="gait">5. Gait</label>
<select id="gait" onchange="calculateScore()">
<option value="3">Independent (including use of sticks/canes) (3 pts)</option>
<option value="2">Independent with frame/walker (2 pts)</option>
<option value="1">Mobile with aid but erratic/unsafe turning OR needs help of 1 person (1 pt)</option>
<option value="0">Requires physical assistance or constant supervision (0 pts)</option>
</select>
</div>

<!-- 6. Timed Walk (6 Meters) -->
<div class="question-block">
<label for="timedWalk">6. Timed Walk (6 Meters)</label>
<select id="timedWalk" onchange="calculateScore()">
<option value="3">Under 15 seconds (3 pts)</option>
<option value="2">16–30 seconds (2 pts)</option>
<option value="1">Over 30 seconds (1 pt)</option>
<option value="0">Unable to perform (0 pts)</option>
</select>
</div>

<!-- 7. Functional Reach -->
<div class="question-block">
<label for="functionalReach">7. Functional Reach</label>
<select id="functionalReach" onchange="calculateScore()">
<option value="4">Over 20 cm (4 pts)</option>
<option value="2">10–20 cm (2 pts)</option>
<option value="0">Under 10 cm (0 pts)</option>
</select>
</div>
</form>

<!-- Results Section -->
<div class="result-box">
<div><strong>Total EMS Score</strong></div>
<div class="score-display" id="totalScore">20 / 20</div>
<div class="interpretation" id="interpretationText">
Category: <span class="status-independent">Independent</span><br>
Maneuvers alone and safely. Generally safe to live at home.
</div>
</div>
</div>

<script>
function calculateScore() {
// Get values from all inputs
const q1 = parseInt(document.getElementById('lyingToSitting').value);
const q2 = parseInt(document.getElementById('sittingToLying').value);
const q3 = parseInt(document.getElementById('sitToStand').value);
const q4 = parseInt(document.getElementById('standing').value);
const q5 = parseInt(document.getElementById('gait').value);
const q6 = parseInt(document.getElementById('timedWalk').value);
const q7 = parseInt(document.getElementById('functionalReach').value);

// Sum up the score
const total = q1 + q2 + q3 + q4 + q5 + q6 + q7;

// Update display
document.getElementById('totalScore').innerText = total + " / 20";

// Logic for Clinical Interpretation
let interpretationHTML = "";
if (total >= 14) {
interpretationHTML = `Category: <span class="status-independent">Independent</span><br>Maneuvers alone and safely. Independent in basic Activities of Daily Living (ADLs).`;
} else if (total >= 10 && total <= 13) {
interpretationHTML = `Category: <span class="status-borderline">Borderline</span><br>Borderline safe mobility and ADL independence. Elevated fall risk. Will require some assistance.`;
} else {
interpretationHTML = `Category: <span class="status-dependent">Dependent</span><br>High fall risk and dependency. Requires significant help with basic mobility maneuvers.`;
}

document.getElementById('interpretationText').innerHTML = interpretationHTML;
}

// Initialize the calculation on load
window.onload = calculateScore;
</script>

</body>
</html>
